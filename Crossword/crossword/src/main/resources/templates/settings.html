<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Paramètres</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Nunito', Arial, sans-serif;
            background: linear-gradient(135deg, #f48fb1 0%, #fce4ec 35%, #e1bee7 65%, #b39ddb 100%);
            padding: 2rem 1rem;
            position: relative;
            overflow: hidden;
        }

        /* ── LETTRES FLOTTANTES ── */
        .bg-letter {
            position: fixed;
            font-family: 'Fredoka One', cursive;
            font-size: 2.2rem;
            color: rgba(255,255,255,0.28);
            pointer-events: none;
            animation: swing var(--dur, 9s) ease-in-out infinite;
            transform-origin: 50% 0;
        }
        @keyframes swing {
            0%   { transform: rotate(-7deg); }
            50%  { transform: rotate(7deg); }
            100% { transform: rotate(-7deg); }
        }

        /* ── CARD ── */
        .card {
            background: white;
            border-radius: 28px;
            padding: 36px 34px 30px;
            width: 380px;
            box-shadow: 0 20px 50px rgba(173,20,87,0.15);
            text-align: center;
            position: relative;
            z-index: 1;
            animation: slideUp 0.5s cubic-bezier(0.16,1,0.3,1) both;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(28px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── LOGO TUILES ── */
        .logo-tiles {
            display: flex;
            gap: 5px;
            justify-content: center;
            margin-bottom: 10px;
        }
        .ltile {
            width: 36px; height: 36px;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Fredoka One', cursive;
            font-size: 1.1rem; color: white;
            position: relative;
        }
        .ltile .tn {
            position: absolute; top: 2px; left: 3px;
            font-size: 7px; font-family: 'Nunito', sans-serif;
            font-weight: 700; opacity: 0.55;
        }
        .t1 { background: #e91e8c; }
        .t2 { background: #7c3aed; }
        .t3 { background: #0ea5e9; }
        .t4 { background: #f59e0b; }

        /* ── AVATAR ── */
        .avatar {
            width: 86px; height: 86px;
            border-radius: 50%;
            background: linear-gradient(135deg, #e91e8c, #ce93d8);
            display: flex; align-items: center; justify-content: center;
            font-size: 38px;
            margin: 16px auto 10px;
            box-shadow: 0 6px 20px rgba(233,30,140,0.35);
        }

        /* ── NOM & GENRE ── */
        .player-name {
            font-family: 'Fredoka One', cursive;
            font-size: 22px;
            color: #880e4f;
            margin-bottom: 3px;
        }
        .player-sexe {
            font-size: 12px;
            color: #b0bec5;
            margin-bottom: 20px;
            font-weight: 600;
        }

        /* ── STATS ── */
        .score-row {
            display: flex;
            border-radius: 14px;
            overflow: hidden;
            border: 2px solid #fce4ec;
            margin-bottom: 18px;
        }
        .score-item {
            flex: 1;
            padding: 12px 0;
            background: #fdf6f9;
        }
        .score-item:not(:last-child) { border-right: 2px solid #fce4ec; }
        .score-value {
            font-family: 'Fredoka One', cursive;
            font-size: 24px;
            color: #e91e8c;
        }
        .score-label {
            font-size: 11px;
            color: #b0bec5;
            font-weight: 700;
            margin-top: 2px;
        }

        /* ── DIVIDER ── */
        .divider {
            border: none;
            border-top: 2px solid #fce4ec;
            margin: 4px 0 14px;
        }

        /* ── INFO ROWS ── */
        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 11px 14px;
            background: #fdf6f9;
            border-radius: 12px;
            margin-bottom: 8px;
            border: 1.5px solid #fce4ec;
        }
        .info-label {
            font-size: 13px;
            color: #90a4ae;
            font-weight: 700;
        }
        .info-value {
            font-size: 13px;
            font-weight: 800;
            color: #880e4f;
        }

        /* ── BOUTON RETOUR ── */
        .back-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            margin-top: 18px;
            padding: 13px;
            background: linear-gradient(135deg, #e91e8c, #ce93d8);
            border: none;
            color: white;
            border-radius: 14px;
            text-decoration: none;
            font-size: 15px;
            font-family: 'Fredoka One', cursive;
            letter-spacing: 0.4px;
            box-shadow: 0 5px 18px rgba(233,30,140,0.3);
            transition: 0.25s;
            position: relative;
            overflow: hidden;
        }
        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(233,30,140,0.4);
        }
        .btn-shine {
            position: absolute; top: 0; left: -100%;
            width: 55%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.22), transparent);
            animation: shine 2.8s infinite;
        }
        @keyframes shine {
            0% { left: -100%; }
            40%,100% { left: 160%; }
        }
    </style>
</head>
<body>

<!-- Lettres flottantes -->
<div class="bg-letter" style="top:5%;left:3%;--dur:8s">A</div>
<div class="bg-letter" style="top:8%;left:85%;--dur:11s">Z</div>
<div class="bg-letter" style="top:25%;left:7%;--dur:9s">W</div>
<div class="bg-letter" style="top:45%;left:90%;--dur:10s">X</div>
<div class="bg-letter" style="top:62%;left:4%;--dur:12s">Q</div>
<div class="bg-letter" style="top:75%;left:83%;--dur:9s">K</div>
<div class="bg-letter" style="top:35%;left:92%;--dur:13s">M</div>
<div class="bg-letter" style="top:88%;left:15%;--dur:10s">B</div>

<div class="card">

    <!-- Logo tuiles -->
    <div class="logo-tiles">
        <div class="ltile t1"><span class="tn">1</span>W</div>
        <div class="ltile t2"><span class="tn">2</span>O</div>
        <div class="ltile t3"><span class="tn">3</span>R</div>
        <div class="ltile t4"><span class="tn">4</span>D</div>
    </div>

    <!-- Avatar -->
    <div class="avatar">🎮</div>

    <!-- Nom & genre -->
    <div class="player-name" th:text="${player.name}">Joueur</div>
    <div class="player-sexe" th:text="${player.sexe}">—</div>

    <!-- Stats -->
    <div class="score-row">
        <div class="score-item">
            <div class="score-value" th:text="${player.score}">0</div>
            <div class="score-label">⭐ Score</div>
        </div>
        <div class="score-item">
            <div class="score-value" th:text="${player.currentLevel}">1</div>
            <div class="score-label">🎯 Niveau</div>
        </div>
    </div>

    <hr class="divider">

    <!-- Infos -->
    <div class="info-row">
        <span class="info-label">👤 Nom</span>
        <span class="info-value" th:text="${player.name}"></span>
    </div>
    <div class="info-row">
        <span class="info-label">⚧ Sexe</span>
        <span class="info-value" th:text="${player.sexe}"></span>
    </div>
    <div class="info-row">
        <span class="info-label">🏆 Meilleur score</span>
        <span class="info-value" th:text="${player.score}"></span>
    </div>
    <div class="info-row">
        <span class="info-label">📊 Niveau actuel</span>
        <span class="info-value" th:text="${player.currentLevel}"></span>
    </div>

    <!-- Retour -->
    <a th:href="@{/home}" class="back-btn">
        <div class="btn-shine"></div>
        ⬅ Retour à l'accueil
    </a>

</div>

</body>
</html>
