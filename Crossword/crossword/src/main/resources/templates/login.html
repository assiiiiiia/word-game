<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>

    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Nunito', Arial, sans-serif;
            background: linear-gradient(135deg, #f48fb1 0%, #fce4ec 35%, #e1bee7 65%, #b39ddb 100%);
            padding: 2rem 1rem;
            position: relative;
            overflow: hidden;
        }

        /* Background letters */
        .bg-letter {
            position: fixed;
            font-family: 'Fredoka One', cursive;
            font-size: 2.2rem;
            color: rgba(255,255,255,0.28);
            pointer-events: none;
            animation: swing var(--dur, 9s) ease-in-out infinite;
            transform-origin: 50% 0;
        }

        @keyframes swing {
            0% { transform: rotate(-7deg); }
            50% { transform: rotate(7deg); }
            100% { transform: rotate(-7deg); }
        }

        /* Card */
        .card {
            background: white;
            border-radius: 28px;
            padding: 38px 36px 32px;
            width: 380px;
            box-shadow: 0 20px 50px rgba(173,20,87,0.15);
            text-align: center;
            position: relative;
            z-index: 1;
            animation: slideUp 0.5s cubic-bezier(0.16,1,0.3,1) both;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Logo */
        .logo-tiles {
            display: flex;
            gap: 5px;
            justify-content: center;
            margin-bottom: 10px;
        }

        .ltile {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Fredoka One', cursive;
            font-size: 1.1rem;
            color: white;
            position: relative;
        }

        .ltile .tn {
            position: absolute;
            top: 2px;
            left: 3px;
            font-size: 7px;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            opacity: 0.55;
        }

        .t1 { background: #e91e8c; }
        .t2 { background: #7c3aed; }
        .t3 { background: #0ea5e9; }
        .t4 { background: #f59e0b; }

        h1 {
            font-family: 'Fredoka One', cursive;
            font-size: 23px;
            color: #880e4f;
            margin-bottom: 4px;
        }

        .subtitle {
            font-size: 12px;
            color: #b0bec5;
            margin-bottom: 24px;
        }

        /* Inputs */
        .input-group {
            position: relative;
            margin-bottom: 14px;
            text-align: left;
        }

        .input-group label {
            font-size: 12px;
            color: #78909c;
            margin-bottom: 5px;
            display: block;
            font-weight: 700;
            letter-spacing: 0.3px;
        }

        .input-group input {
            width: 100%;
            padding: 11px 14px 11px 42px;
            border-radius: 11px;
            border: 2px solid #f3e5f5;
            outline: none;
            font-size: 14px;
            transition: 0.25s;
        }

        .input-group input:focus {
            border-color: #e91e8c;
            box-shadow: 0 0 0 3px rgba(233,30,140,0.1);
        }

        .icon {
            position: absolute;
            left: 13px;
            bottom: 6px;
        }

        .icon svg { width: 18px; height: 18px; }

        .eye-toggle {
            position: absolute;
            right: 12px;
            bottom: 10px;
            background: none;
            border: none;
            cursor: pointer;
        }

        .eye-toggle svg {
            width: 17px;
            height: 17px;
            stroke: #b0bec5;
            transition: 0.2s;
        }

        .eye-toggle:hover svg {
            stroke: #e91e8c;
        }

        /* Button */
        button[type="submit"] {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #e91e8c, #ce93d8);
            border: none;
            color: white;
            border-radius: 11px;
            cursor: pointer;
            font-size: 15px;
            font-family: 'Fredoka One', cursive;
            letter-spacing: 0.5px;
            margin-top: 4px;
            box-shadow: 0 5px 18px rgba(233,30,140,0.3);
            transition: 0.25s;
            position: relative;
            overflow: hidden;
        }

        button[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(233,30,140,0.4);
        }

        .btn-shine {
            position: absolute;
            top: 0;
            left: -100%;
            width: 55%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.22), transparent);
            animation: shine 2.8s infinite;
        }

        @keyframes shine {
            0% { left: -100%; }
            40%,100% { left: 160%; }
        }

        /* Error */
        .error-box {
            color: #c2185b;
            background: #fce4ec;
            padding: 9px;
            border-radius: 9px;
            margin-bottom: 12px;
            font-size: 12px;
            font-weight: 700;
            text-align: left;
        }

        .divider {
            margin: 18px 0;
            border: none;
            border-top: 2px solid #fce4ec;
        }

        .register-link {
            font-size: 13px;
            color: #90a4ae;
        }

        .register-link a {
            color: #e91e8c;
            font-weight: 700;
            text-decoration: none;
        }
    </style>
</head>

<body>

<!-- Background letters -->
<div class="bg-letter" style="top:5%;left:3%;--dur:8s">A</div>
<div class="bg-letter" style="top:8%;left:85%;--dur:11s">Z</div>
<div class="bg-letter" style="top:25%;left:7%;--dur:9s">W</div>
<div class="bg-letter" style="top:45%;left:90%;--dur:10s">X</div>
<div class="bg-letter" style="top:62%;left:4%;--dur:12s">Q</div>
<div class="bg-letter" style="top:75%;left:83%;--dur:9s">K</div>

<div class="card">

    <div class="logo-tiles">
        <div class="ltile t1"><span class="tn">1</span>W</div>
        <div class="ltile t2"><span class="tn">2</span>O</div>
        <div class="ltile t3"><span class="tn">3</span>R</div>
        <div class="ltile t4"><span class="tn">4</span>D</div>
    </div>

    <h1>Connexion</h1>
    <p class="subtitle">Entre pour continuer le jeu 🎮</p>

    <form th:action="@{/login}" method="post">

        <div th:if="${error}" class="error-box">
            <span th:text="${error}"></span>
        </div>

        <!-- Username -->
        <div class="input-group">
            <label>Nom d'utilisateur</label>
            <span class="icon">
                <svg fill="none" stroke="#ce93d8" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                </svg>
            </span>
            <input type="text" name="name" required>
        </div>

        <!-- Password -->
        <div class="input-group">
            <label>Mot de passe</label>
            <span class="icon">
                <svg fill="none" stroke="#ce93d8" stroke-width="2" viewBox="0 0 24 24">
                    <rect x="3" y="11" width="18" height="11" rx="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
            </span>

            <input type="password" name="password" id="password" required>

            <button type="button" class="eye-toggle" onclick="togglePassword()">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                    <circle cx="12" cy="12" r="3"/>
                </svg>
            </button>
        </div>

        <button type="submit">
            <div class="btn-shine"></div>
            Se connecter →
        </button>

    </form>

    <hr class="divider">

    <p class="register-link">
        Pas encore de compte ?
        <a th:href="@{/register-page}">Créer un compte</a>
    </p>

</div>

<script>
function togglePassword() {
    const input = document.getElementById("password");
    input.type = input.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
